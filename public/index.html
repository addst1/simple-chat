<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>간단 채팅</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<meta name="theme-color" content="#0078D4" />
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
<style>
  :root {
    --bg: #F3F2F1;
    --sur: #FFFFFF;
    --ele: #EDEBE9;
    --bd: #C8C6C4;
    --bd2: #A19F9D;
    --tx: #201F1E;
    --sub: #605E5C;
    --acc: #0078D4;
    --acc-h: #106EBE;
    --acc-l: #DEECF9;
    --r: 4px;
    --rs: 2px;
    --shadow: 0 1.6px 3.6px rgba(0,0,0,.13), 0 0.3px 0.9px rgba(0,0,0,.11);
    --shadow-md: 0 6.4px 14.4px rgba(0,0,0,.13), 0 1.2px 3.6px rgba(0,0,0,.11);
    --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1B1A19;
      --sur: #252423;
      --ele: #323130;
      --bd: #3B3A39;
      --bd2: #605E5C;
      --tx: #F3F2F1;
      --sub: #C8C6C4;
      --acc-l: #004578;
    }
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font);
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    background: var(--bg);
    color: var(--tx);
    height: 100vh;
    overflow: hidden;
  }

  .icon { width: 18px; height: 18px; display: inline-block; vertical-align: middle; }
  .icon path, .icon circle, .icon rect, .icon line { vector-effect: non-scaling-stroke; }

  #join-screen, #chat-screen {
    width: 100%;
    height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---- 입장 화면 ---- */
  #join-screen {
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 24px;
  }
  .join-card {
    background: var(--sur);
    border: 1px solid var(--bd);
    border-radius: var(--r);
    box-shadow: var(--shadow-md);
    padding: 32px 28px;
    width: 100%;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  .join-logo {
    width: 48px; height: 48px;
    border-radius: var(--r);
    background: var(--acc);
    display: flex; align-items: center; justify-content: center;
  }
  .join-logo .icon { width: 26px; height: 26px; color: #fff; }
  .join-card h1 { margin: 0; font-size: 16px; font-weight: 700; color: var(--tx); }

  .mf { width: 100%; }
  .mf label {
    display: block; font-size: 11px; color: var(--sub);
    margin-bottom: 4px; font-weight: 600;
  }
  .mf input {
    width: 100%; height: 34px;
    border: 1px solid var(--bd); border-bottom: 2px solid var(--bd);
    border-radius: var(--rs) var(--rs) 0 0;
    padding: 0 10px; font-size: 13px; font-family: var(--font);
    background: var(--ele); color: var(--tx);
    transition: border-color .1s;
  }
  .mf input:focus { outline: none; border-bottom-color: var(--acc); background: var(--sur); }

  .btn {
    height: 34px; padding: 0 18px;
    border-radius: var(--rs); border: 1px solid var(--bd);
    background: var(--sur); color: var(--tx);
    font-size: 13px; font-weight: 400; font-family: var(--font);
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    cursor: pointer;
    transition: background .1s, border-color .1s;
  }
  .btn:hover  { background: var(--ele); border-color: var(--bd2); }
  .btn:active { background: var(--bd); }
  .btn.acc { background: var(--acc); color: #fff; border-color: transparent; width: 100%; }
  .btn.acc:hover { background: var(--acc-h); }
  .btn.acc .icon { color: #fff; }

  /* ---- 채팅 화면 ---- */
  #chat-screen { display: none; }
  #chat-header {
    height: 44px; flex-shrink: 0;
    padding: 0 16px;
    background: var(--sur);
    border-bottom: 1px solid var(--bd);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #chat-header .title-wrap { display: flex; align-items: center; gap: 8px; }
  #chat-header .title-wrap .icon { color: var(--acc); }
  #header-title { font-weight: 600; font-size: 13px; color: var(--tx); }
  .hdr-right { display: flex; align-items: center; gap: 14px; }
  .status-chip {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10.5px; color: var(--sub); font-weight: 600;
  }
  .status-chip .icon { width: 14px; height: 14px; }
  .status-chip.ok  { color: #107C10; }
  .status-chip.err { color: #D13438; }

  #messages {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--bg);
  }
  .msg { max-width: 75%; display: flex; flex-direction: column; }
  .msg .bubble {
    padding: 8px 12px;
    border-radius: 14px;
    background: var(--sur);
    border: 1px solid var(--bd);
    font-size: 13.5px;
    line-height: 1.5;
    word-break: break-word;
    color: var(--tx);
  }
  .msg .meta {
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 3px;
    padding: 0 2px;
  }
  .msg .time {
    font-size: 10px;
    color: var(--sub);
    margin-top: 2px;
    padding: 0 2px;
  }
  .msg.me { align-self: flex-end; align-items: flex-end; }
  .msg.me .bubble { background: var(--acc); color: #fff; border-color: transparent; }
  .msg.me .meta { color: var(--acc); text-align: right; }
  .msg.other { align-self: flex-start; align-items: flex-start; }
  .msg.system { align-self: center; }
  .msg.system .bubble { background: transparent; border: none; color: var(--sub); font-size: 11.5px; padding: 2px 8px; }

  #chat-form {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    border-top: 1px solid var(--bd);
    background: var(--sur);
    flex-shrink: 0;
  }
  #chat-form input {
    flex: 1;
    height: 36px;
    padding: 0 12px;
    border: 1px solid var(--bd); border-bottom: 2px solid var(--bd);
    border-radius: var(--rs) var(--rs) 0 0;
    font-size: 13.5px; font-family: var(--font);
    background: var(--ele); color: var(--tx);
    transition: border-color .1s;
  }
  #chat-form input:focus { outline: none; border-bottom-color: var(--acc); background: var(--sur); }
  #chat-form .btn.acc { width: auto; padding: 0 16px; }
</style>
</head>
<body>

<!-- 아이콘 정의 (Pretendard 스타일 — 플랫, 라운드 스트로크의 기하학적 심볼) -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <symbol id="ic-chat" viewBox="0 0 24 24">
      <path d="M4 5.5C4 4.67 4.67 4 5.5 4h13c.83 0 1.5.67 1.5 1.5v10c0 .83-.67 1.5-1.5 1.5H9l-4 4v-4H5.5C4.67 17 4 16.33 4 15.5v-10z"
        fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
    </symbol>
    <symbol id="ic-bell" viewBox="0 0 24 24">
      <path d="M12 3.5c-3 0-5 2.2-5 5v3.2c0 .6-.2 1.2-.6 1.7L5 15.5h14l-1.4-2.1c-.4-.5-.6-1.1-.6-1.7V8.5c0-2.8-2-5-5-5z"
        fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
      <path d="M9.5 18.5a2.5 2.5 0 0 0 5 0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>
    <symbol id="ic-bell-off" viewBox="0 0 24 24">
      <path d="M9.5 18.5a2.5 2.5 0 0 0 5 0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M7 6.3C7.7 4.7 9.6 3.5 12 3.5c3 0 5 2.2 5 5v3.2c0 .6.2 1.2.6 1.7l1.4 2.1H6"
        fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
      <path d="M5 15.5l1.6-2.4c.26-.4.4-.86.4-1.34" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="3.5" y1="3.5" x2="20.5" y2="20.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>
    <symbol id="ic-users" viewBox="0 0 24 24">
      <circle cx="9" cy="8" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/>
      <path d="M3.5 19c0-3 2.5-5 5.5-5s5.5 2 5.5 5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M15 5.5c1.4.3 2.5 1.5 2.5 3S16.4 11.2 15 11.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M16.5 14.2c2 .4 3.5 2 3.5 4.3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </symbol>
    <symbol id="ic-send" viewBox="0 0 24 24">
      <path d="M4 12l16-7-6.5 16-2.7-6.8L4 12z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
    </symbol>
  </defs>
</svg>

<div id="join-screen">
  <div class="join-card">
    <div class="join-logo"><svg class="icon"><use href="#ic-chat"/></svg></div>
    <h1>간단 채팅</h1>
    <div class="mf">
      <label for="name-input">닉네임</label>
      <input id="name-input" type="text" placeholder="닉네임을 입력하세요" maxlength="20" autofocus />
    </div>
    <button id="join-btn" class="btn acc">입장하기</button>
  </div>
</div>

<div id="chat-screen">
  <div id="chat-header">
    <span class="title-wrap">
      <svg class="icon"><use href="#ic-chat"/></svg>
      <span id="header-title">채팅방</span>
    </span>
    <span class="hdr-right">
      <span class="status-chip" id="push-status"></span>
      <span class="status-chip" id="user-count"><svg class="icon"><use href="#ic-users"/></svg></span>
    </span>
  </div>
  <div id="messages"></div>
  <form id="chat-form">
    <input id="msg-input" type="text" placeholder="메시지를 입력하세요" autocomplete="off" />
    <button type="submit" class="btn acc">
      <svg class="icon"><use href="#ic-send"/></svg>
      전송
    </button>
  </form>
</div>

<script>
  const joinScreen = document.getElementById('join-screen');
  const chatScreen = document.getElementById('chat-screen');
  const nameInput = document.getElementById('name-input');
  const joinBtn = document.getElementById('join-btn');
  const messagesEl = document.getElementById('messages');
  const chatForm = document.getElementById('chat-form');
  const msgInput = document.getElementById('msg-input');
  const userCount = document.getElementById('user-count');

  let myName = '';
  let ws;

  // 페이지 열리면 바로 닉네임 입력창에 커서 + 기존 텍스트 선택
  nameInput.focus();
  nameInput.select();

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}`);

    ws.addEventListener('open', () => {
      ws.send(JSON.stringify({ type: 'join', name: myName }));
    });

    ws.addEventListener('message', (event) => {
      const data = JSON.parse(event.data);
      if (data.type === 'message') {
        addMessage(data.name, data.text, data.time, data.name === myName);
      } else if (data.type === 'system') {
        addSystemMessage(data.text);
      } else if (data.type === 'users') {
        userCount.innerHTML = `<svg class="icon"><use href="#ic-users"/></svg>${data.users.length}명 접속 중`;
      }
    });

    ws.addEventListener('close', () => {
      addSystemMessage('서버와 연결이 끊어졌습니다.');
    });
  }

  // 닉네임마다 고정된 색상을 배정 (구분 목적)
  const nameColors = ['#0078D4', '#B7860D', '#107C10', '#C239B3', '#8764B8', '#D13438', '#986F0B'];
  function colorForName(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) >>> 0;
    return nameColors[hash % nameColors.length];
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    const h = d.getHours().toString().padStart(2, '0');
    const m = d.getMinutes().toString().padStart(2, '0');
    return `${h}:${m}`;
  }

  function addMessage(name, text, time, isMe) {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + (isMe ? 'me' : 'other');
    const metaColor = isMe ? '' : `style="color:${colorForName(name)}"`;
    wrap.innerHTML = `
      <div class="meta" ${metaColor}>${isMe ? '나' : escapeHtml(name)}</div>
      <div class="bubble">${escapeHtml(text)}</div>
      <div class="time">${formatTime(time)}</div>
    `;
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addSystemMessage(text) {
    const wrap = document.createElement('div');
    wrap.className = 'msg system';
    wrap.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  joinBtn.addEventListener('click', doJoin);
  nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doJoin(); });

  function doJoin() {
    const name = nameInput.value.trim();
    if (!name) return;
    myName = name;
    document.getElementById('header-title').textContent = `채팅방 - ${name}`;
    joinScreen.style.display = 'none';
    chatScreen.style.display = 'flex';
    connect();
    msgInput.focus();
    setupPushNotifications(name);
  }

  // ---- 푸시 알림 구독 (앱을 닫아도/화면이 꺼져도 새 메시지 알림) ----
  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - (base64String.length % 4)) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    return Uint8Array.from([...rawData].map((c) => c.charCodeAt(0)));
  }

  function setPushStatus(text, state) {
    // state: 'ok' | 'err' | 'neutral'
    const el = document.getElementById('push-status');
    if (!el) return;
    const iconId = state === 'ok' ? '#ic-bell' : '#ic-bell-off';
    el.className = 'status-chip' + (state === 'ok' ? ' ok' : state === 'err' ? ' err' : '');
    el.innerHTML = `<svg class="icon"><use href="${iconId}"/></svg>${text}`;
  }

  async function setupPushNotifications(name) {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
      setPushStatus('알림 미지원 브라우저', 'err');
      return;
    }
    try {
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        setPushStatus('알림 권한 거부됨', 'err');
        return;
      }

      const registration = await navigator.serviceWorker.ready;
      const vapidPublicKey = await (await fetch('/vapid-public-key')).text();

      // 이전 구독이 남아있어도 서버 재시작으로 무효화됐을 수 있으니
      // 항상 구독을 해지 후 새로 만들어서 서버와 확실히 동기화
      let subscription = await registration.pushManager.getSubscription();
      if (subscription) {
        await subscription.unsubscribe();
      }
      subscription = await registration.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(vapidPublicKey),
      });

      const res = await fetch('/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, subscription }),
      });

      if (res.ok) {
        setPushStatus('알림 켜짐', 'ok');
      } else {
        setPushStatus('알림 등록 실패', 'err');
      }
    } catch (err) {
      setPushStatus('알림 오류', 'err');
    }
  }

  chatForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = msgInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'message', text }));
    msgInput.value = '';
  });
</script>

</body>
</html>
