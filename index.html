<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>간단 채팅</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f2f3f5;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #join-screen, #chat-screen {
    width: 420px;
    height: 640px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #join-screen {
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 24px;
  }
  #join-screen h1 { margin: 0 0 8px; font-size: 20px; color: #222; }
  #join-screen input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
  }
  #join-screen button, #chat-form button {
    background: #5b6cff;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 18px;
    font-size: 15px;
    cursor: pointer;
  }
  #join-screen button:hover, #chat-form button:hover { background: #4756d6; }
  #chat-screen { display: none; }
  #chat-header {
    padding: 14px 18px;
    border-bottom: 1px solid #eee;
    font-weight: 600;
    color: #222;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #chat-header span.count { font-weight: 400; font-size: 12px; color: #888; }
  #messages {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .msg { max-width: 75%; }
  .msg .bubble {
    padding: 8px 12px;
    border-radius: 14px;
    background: #eee;
    font-size: 14px;
    line-height: 1.4;
    word-break: break-word;
  }
  .msg .meta { font-size: 11px; color: #999; margin-bottom: 2px; }
  .msg.me { align-self: flex-end; }
  .msg.me .bubble { background: #5b6cff; color: #fff; }
  .msg.system { align-self: center; }
  .msg.system .bubble { background: transparent; color: #999; font-size: 12px; }
  #chat-form {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid #eee;
  }
  #chat-form input {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
  }
</style>
</head>
<body>

<div id="join-screen">
  <h1>💬 간단 채팅</h1>
  <input id="name-input" type="text" placeholder="닉네임을 입력하세요" maxlength="20" />
  <button id="join-btn">입장하기</button>
</div>

<div id="chat-screen">
  <div id="chat-header">
    <span id="header-title">채팅방</span>
    <span class="count" id="user-count"></span>
  </div>
  <div id="messages"></div>
  <form id="chat-form">
    <input id="msg-input" type="text" placeholder="메시지를 입력하세요" autocomplete="off" />
    <button type="submit">전송</button>
  </form>
</div>

<script>
  const joinScreen = document.getElementById('join-screen');
  const chatScreen = document.getElementById('chat-screen');
  const nameInput = document.getElementById('name-input');
  const joinBtn = document.getElementById('join-btn');
  const messagesEl = document.getElementById('messages');
  const chatForm = document.getElementById('chat-form');
  const msgInput = document.getElementById('msg-input');
  const userCount = document.getElementById('user-count');

  let myName = '';
  let ws;

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}`);

    ws.addEventListener('open', () => {
      ws.send(JSON.stringify({ type: 'join', name: myName }));
    });

    ws.addEventListener('message', (event) => {
      const data = JSON.parse(event.data);
      if (data.type === 'message') {
        addMessage(data.name, data.text, data.name === myName);
      } else if (data.type === 'system') {
        addSystemMessage(data.text);
      } else if (data.type === 'users') {
        userCount.textContent = `${data.users.length}명 접속 중`;
      }
    });

    ws.addEventListener('close', () => {
      addSystemMessage('서버와 연결이 끊어졌습니다.');
    });
  }

  function addMessage(name, text, isMe) {
    const wrap = document.createElement('div');
    wrap.className = 'msg' + (isMe ? ' me' : '');
    wrap.innerHTML = `
      <div class="meta">${isMe ? '' : escapeHtml(name)}</div>
      <div class="bubble">${escapeHtml(text)}</div>
    `;
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addSystemMessage(text) {
    const wrap = document.createElement('div');
    wrap.className = 'msg system';
    wrap.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  joinBtn.addEventListener('click', doJoin);
  nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doJoin(); });

  function doJoin() {
    const name = nameInput.value.trim();
    if (!name) return;
    myName = name;
    document.getElementById('header-title').textContent = `채팅방 - ${name}`;
    joinScreen.style.display = 'none';
    chatScreen.style.display = 'flex';
    connect();
    msgInput.focus();
  }

  chatForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = msgInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'message', text }));
    msgInput.value = '';
  });
</script>

</body>
</html>
